services:
  - type: web
    name: decibel-api
    runtime: node
    region: ohio
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build --workspace=packages/shared && npm run build --workspace=apps/api
    startCommand: node apps/api/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
